<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abstract Brain</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; }
    body { background: transparent; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

    const scene = new THREE.Scene();
    scene.background = null; // transparent

    const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0); // transparent canvas
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.95; // FIX #10: lower so transmission highlights don't blow out
    document.body.appendChild(renderer.domElement);

    // Environment map for reflections + what shows through the glass.
    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
    pmrem.dispose(); // FIX #6: release the generator once the env texture is baked

    const key = new THREE.DirectionalLight(0xfff1e6, 1.2);
    key.position.set(4, 5, 5);
    scene.add(key);
    const fill = new THREE.DirectionalLight(0x88aaff, 0.5);
    fill.position.set(-5, 0, 2);
    scene.add(fill);
    const rim = new THREE.DirectionalLight(0xffffff, 0.9);
    rim.position.set(0, 3, -6);
    scene.add(rim);
    scene.add(new THREE.AmbientLight(0xffffff, 0.15));

    const texture = new THREE.TextureLoader().load('brain-sphere-02-texColor.png');
    texture.flipY = false;
    texture.colorSpace = THREE.SRGBColorSpace;
    texture.wrapS = texture.wrapT = THREE.MirroredRepeatWrapping; // FIX #5: mirror softens the scroll seam

    let model;
    new GLTFLoader().load('brain-sphere_02.gltf', (gltf) => {
      model = gltf.scene;

      // --- FIX #4: UV diagnostic. Logs whether each mesh can actually carry the texture.
      let meshCount = 0, withUV = 0;
      model.traverse((child) => {
        if (child.isMesh) {
          meshCount++;
          const hasUV = !!child.geometry.attributes.uv;
          if (hasUV) withUV++;
          console.log(
            `mesh "${child.name || '(unnamed)'}" — UV: ${hasUV ? 'YES' : 'NO — texture will not map'}`
          );
        }
      });
      console.log(`UV summary: ${withUV}/${meshCount} meshes have UV coordinates.`);
      if (withUV === 0) {
        console.warn(
          'No meshes have UVs. The texture/emissive/scroll will have no effect — ' +
          'the model needs a UV unwrap (re-export from Blender) before texturing works.'
        );
      }

      model.traverse((child) => {
        if (child.isMesh) {
          const m = new THREE.MeshPhysicalMaterial({
            map: texture,
            transparent: true,

            // glass / translucency
            transmission: 0.9,
            thickness: 1.2,
            ior: 1.3,
            attenuationColor: new THREE.Color(0xff5566),
            attenuationDistance: 1.5,

            roughness: 0.15,
            metalness: 0.0,
            envMapIntensity: 1.4,

            clearcoat: 1.0,
            clearcoatRoughness: 0.12,

            // FIX #3: black emissive base so the emissiveMap supplies the color
            // instead of washing it toward white. Low intensity = faint inner glow.
            emissive: new THREE.Color(0x000000),
            emissiveMap: texture,
            emissiveIntensity: 0.15,
          });

          // FIX #2: assign without disposing the source material (shared materials
          // across meshes would otherwise be disposed mid-traverse).
          child.material = m;
        }
      });

      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      model.position.sub(center);
      const scale = 2.5 / Math.max(size.x, size.y, size.z);
      model.scale.setScalar(scale);

      scene.add(model);
    }, undefined, (err) => console.error('Load error:', err));

    const clock = new THREE.Clock();
    let last = 0;
    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();
      const dt = t - last;
      last = t;

      texture.offset.x = t * 0.03;
      texture.offset.y = Math.sin(t * 0.2) * 0.05;

      if (model) model.rotation.y += dt * 0.3;
      renderer.render(scene, camera);
    }
    animate();

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
