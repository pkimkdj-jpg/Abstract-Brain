<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abstract Brain</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0a0a0f; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace; // correct color output
    document.body.appendChild(renderer.domElement);

    // Lighting (PBR materials need it or the model renders black)
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const key = new THREE.DirectionalLight(0xffffff, 1.2);
    key.position.set(5, 5, 5);
    scene.add(key);

    // Load the color texture once, reuse for every mesh
    const texture = new THREE.TextureLoader().load('brain-sphere-02-texColor.png');
    texture.flipY = false;                     // glTF expects unflipped textures
    texture.colorSpace = THREE.SRGBColorSpace; // color/albedo maps are sRGB

    let model;
    new GLTFLoader().load('brain-sphere_02.gltf', (gltf) => {
      model = gltf.scene;

      // Apply the texture to all meshes (harmless if the glTF already has it)
      model.traverse((child) => {
        if (child.isMesh) {
          child.material.map = texture;
          child.material.needsUpdate = true;
        }
      });

      // Center the model and scale it to fit the view
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      model.position.sub(center);                       // recenter at origin
      const scale = 2.5 / Math.max(size.x, size.y, size.z);
      model.scale.setScalar(scale);

      scene.add(model);
    }, undefined, (err) => console.error('Load error:', err));

    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      if (model) model.rotation.y += clock.getDelta() * 0.3; // slow spin, ~3.5s/turn
      renderer.render(scene, camera);
    }
    animate();

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
