<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abstract Brain</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; }
    /* Dark backdrop so the frosted glass has tonal contrast to read against.
       To make the canvas transparent over other content instead, set this to
       `transparent` and uncomment the setClearColor line below. */
    body { background: radial-gradient(circle at 50% 40%, #1a1d2e 0%, #07080f 70%); }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

    const scene = new THREE.Scene();
    scene.background = null;

    const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    // renderer.setClearColor(0x000000, 0); // uncomment for a transparent canvas
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.body.appendChild(renderer.domElement);

    // Environment map: the reflections and refractions a glass surface picks up.
    // Without this, glass looks dull and grey — it's essential, not optional.
    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
    pmrem.dispose();

    // Lighting kept simple and neutral — no color, this is the colorless pass.
    const key = new THREE.DirectionalLight(0xffffff, 1.5);
    key.position.set(4, 5, 5);
    scene.add(key);
    const rim = new THREE.DirectionalLight(0xffffff, 1.0);
    rim.position.set(-3, 2, -6);
    scene.add(rim);
    scene.add(new THREE.AmbientLight(0xffffff, 0.2));

    let model;
    new GLTFLoader().load('brain-sphere_02.gltf', (gltf) => {
      model = gltf.scene;

      model.traverse((child) => {
        if (child.isMesh) {
          child.material = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,          // neutral white glass, no tint
            transparent: true,

            transmission: 1.0,        // fully transmissive (glass)
            thickness: 1.0,           // how far light travels through the body
            ior: 1.45,                // ~glass
            roughness: 0.35,          // THE frosted dial: 0 = clear, higher = frostier

            metalness: 0.0,
            envMapIntensity: 1.2,

            clearcoat: 1.0,           // glossy outer shell
            clearcoatRoughness: 0.2,
          });
        }
      });

      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      model.position.sub(center);
      const scale = 2.5 / Math.max(size.x, size.y, size.z);
      model.scale.setScalar(scale);

      scene.add(model);
    }, undefined, (err) => console.error('Load error:', err));

    const clock = new THREE.Clock();
    let last = 0;
    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();
      const dt = t - last;
      last = t;
      if (model) model.rotation.y += dt * 0.3;
      renderer.render(scene, camera);
    }
    animate();

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
